<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Rashmika & Vimansa</title>
    <meta name="description" content="You are invited to the wedding of Rashmika and Vimansa.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/magic.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Blurred Background -->
    <div class="bg-blur"></div>

    <!-- Raining flower petals layer (above bg, below card) -->
    <div id="petal-rain" class="petal-rain"></div>

    <!-- Main centered layout -->
    <div class="page-wrapper">

        <div class="card">

            <!-- TOP-LEFT corner vine -->
            <img src="assets/images/top_left_vine.png" class="corner-vine corner-vine--tl" alt="top left floral vine">

            <!-- TOP-RIGHT corner vine -->
            <img src="assets/images/top_right_vine.png" class="corner-vine corner-vine--tr" alt="top right floral vine">

            <!-- Heart badge -->
            <div class="heart-badge">
                <svg viewBox="0 0 24 24" fill="white" width="17" height="17">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
            </div>

            <!-- Card content -->
            <div class="card-body">
                <p class="invite-text">You are cordially invited to the wedding of</p>

                <h1 class="names">RASHMIKA</h1>
                <p class="and">&</p>
                <h1 class="names">WIMANSA</h1>

                <div class="divider">
                    <span class="line"></span>
                    <span class="ornament">❦</span>
                    <span class="line"></span>
                </div>

                <p class="date">July 31, 2026</p>
                <p class="youre-invited">You're Invited</p>

                <button id="openInvitationBtn" class="btn">Open Invitation</button>
            </div>

            <!-- Bottom vine: absolutely at the card's bottom edge, overlapping the button -->
            <img src="assets/images/red_bottom_vine.png" class="bottom-red-vine" alt="red floral vine">

        </div>

    </div>

    <script src="assets/js/app.js"></script>
</body>

</html>
